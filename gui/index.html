<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Parsec Switcher</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Alert: Admin Required (Windows only) -->
    <div id="admin-priv">
      <div class="alert-banner">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <p><strong>Permissão necessária!</strong> O Parsec Switcher precisa de acesso de administrador para funcionar. Feche e abra novamente como administrador.</p>
      </div>
    </div>

    <!-- Header -->
    <header class="app-header">
      <div class="header-meta">
        <div>
          <h1 class="app-title">
            <span class="icon-glow"><i class="fa-solid fa-shuffle"></i></span>
            Parsec Switcher
          </h1>
          <p class="app-subtitle">Gerencie suas contas Parsec em um clique</p>
        </div>
        <span class="version-badge" id="parsec_version"></span>
      </div>
    </header>

    <!-- Accounts -->
    <section class="accounts-section">
      <div class="section-label">Suas Contas</div>
      <div id="accounts-container" class="accounts-grid"></div>
    </section>

    <!-- Footer -->
    <footer class="app-footer">
      <button class="add-account-btn" id="add-account-btn">
        <i class="fa-solid fa-user-plus"></i>
        Adicionar Conta
      </button>
    </footer>

  </div>

  <!-- Popup Container -->
  <div id="popup-div"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <span class="loading-text">PROCESSANDO</span>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js"></script>
  <script src="control.js"></script>
</body>
</html>
